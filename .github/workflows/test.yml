name: Bun Monorepo CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  detect:
    name: Detect Changed Packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set-matrix.outputs.packages }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | tr '\n' ' ')
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Detect affected packages
        id: set-matrix
        run: |
          PACKAGES=()

          for dir in packages/*; do
            if echo "${{ steps.changes.outputs.changed }}" | grep -q "$dir"; then
              PACKAGES+=("\"$dir\"")
            fi
          done

          # fallback: run all if nothing detected (e.g. lockfile change)
          if [ ${#PACKAGES[@]} -eq 0 ]; then
            for dir in packages/*; do
              PACKAGES+=("\"$dir\"")
            done
          fi

          echo "packages=[$(IFS=,; echo "${PACKAGES[*]}")]" >> $GITHUB_OUTPUT

  test:
    name: Test Packages
    runs-on: ubuntu-latest
    needs: detect

    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      # ⚡ Cache dependencies
      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      # 🧪 Run tests per package (parallel via matrix)
      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: bun test
